<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Admin Password</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:'Inter', sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#1e3a8a,#2563eb);
}

/* ===== CARD ===== */
.card{
  background:white;
  width:380px;
  padding:32px;
  border-radius:18px;
  text-align:center;
  box-shadow:0 25px 45px rgba(0,0,0,.2);
}

.card h2{
  color:#1e3a8a;
  margin-bottom:22px;
}

/* ===== INPUTS ===== */
input{
  width:100%;
  padding:12px 14px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #cbd5f5;
  font-size:14px;
}

input:focus{
  outline:none;
  border-color:#2563eb;
}

/* ===== BUTTON ===== */
button{
  width:100%;
  padding:14px;
  margin-top:10px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:500;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  background:#1e40af;
}

/* ===== STATUS ===== */
#error{
  color:#dc2626;
  margin-top:8px;
  font-size:14px;
}

#success{
  color:#16a34a;
  margin-top:8px;
  font-size:14px;
}

/* ===== LINK ===== */
a{
  display:inline-block;
  margin-top:18px;
  color:#2563eb;
  text-decoration:none;
  font-size:14px;
}

a:hover{
  text-decoration:underline;
}

/* ===== MOBILE ===== */
@media(max-width:480px){
  .card{
    width:90%;
    padding:26px;
  }
}
</style>
</head>

<body>

<div class="card">
  <h2>Reset Admin Password</h2>

  <!-- STEP 1 -->
  <div id="step1">
    <input id="username" placeholder="Admin Username">
    <button onclick="verifyUsername()">Verify Username</button>
    <div id="error"></div>
    <div id="success"></div>
  </div>

  <!-- STEP 2 -->
  <div id="step2" style="display:none;">
    <input id="newPassword" type="password" placeholder="New Password">
    <button onclick="resetPassword()">Reset Password</button>
  </div>

  <a href="index.html">Back to Login</a>
</div>

<script>
function verifyUsername(){
  const username = document.getElementById("username").value.trim();
  const errorDiv = document.getElementById("error");
  const successDiv = document.getElementById("success");

  errorDiv.textContent = "";
  successDiv.textContent = "";

  if(!username){
    errorDiv.textContent = "Please enter your username";
    return;
  }

  fetch("/admin/check-username", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ username })
  })
  .then(res => res.json())
  .then(data => {
    if(data.exists){
      successDiv.textContent = "Username verified. Please set a new password.";
      setTimeout(() => {
        document.getElementById("step1").style.display = "none";
        document.getElementById("step2").style.display = "block";
      }, 1200);
    } else {
      errorDiv.textContent = "Username not found";
    }
  })
  .catch(() => {
    errorDiv.textContent = "Inavlid username.";
  });
}

function resetPassword(){
  const username = document.getElementById("username").value.trim();
  const newPassword = document.getElementById("newPassword").value.trim();

  if(!newPassword){
    alert("Please enter a new password");
    return;
  }

  fetch("/admin/reset-password", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ username, newPassword })
  })
  .then(res => res.json())
  .then(data => {
    if(data.success){
      alert("Password reset successful");
      location.href = "index.html";
    } else {
      alert(data.message || "Reset failed");
    }
  })
  .catch(() => alert("Server error"));
}
</script>

</body>
</html>
