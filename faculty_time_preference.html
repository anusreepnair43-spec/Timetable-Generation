<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Faculty Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      width: 240px;
      background: #1e293b;
      color: #fff;
      height: 100vh;
      padding-top: 20px;
    }

    .sidebar h2 {
      text-align: center;
      margin-bottom: 30px;
    }

    .sidebar a {
      display: block;
      padding: 12px 20px;
      color: #cbd5e1;
      text-decoration: none;
      cursor: pointer;
    }

    .sidebar a:hover,
    .sidebar a.active {
      background: #334155;
      color: #fff;
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 30px;
    }

    .card {
      background: #fff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .section {
      display: none;
    }

    .section.active {
      display: block;
    }

    h2 {
      margin-top: 0;
    }
  </style>
</head>

<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>Faculty</h2>

    <a class="active" onclick="showSection('subjectPrefs', this)">Subject Preferences</a>
    <a onclick="showSection('timetable', this)">Timetable</a>
    <a onclick="showSection('timePrefs', this)">Time Preferences</a>
    <a onclick="logout()">Logout</a>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">
    <div class="card">

      <!-- SUBJECT PREFERENCES -->
      <div id="subjectPrefs" class="section active">
        <h2>Subject Preferences</h2>
        <p>Subject preference content here...</p>
        <!-- keep your existing subject preference form -->
      </div>

      <!-- TIMETABLE -->
      <div id="timetable" class="section">
        <h2>Timetable</h2>
        <p>Timetable content here...</p>
        <!-- keep your existing timetable logic -->
      </div>

      <!-- TIME PREFERENCES (IFRAME) -->
      <div id="timePrefs" class="section">
        <h2>Time Preferences</h2>

        <iframe
          src="faculty_time_preference.html"
          style="
            width: 100%;
            height: 900px;
            border: none;
            border-radius: 10px;
          ">
        </iframe>
      </div>

    </div>
  </div>

  <script>
    function showSection(id, el) {
      console.log("Opening section:", id);

      document.querySelectorAll(".section")
        .forEach(sec => sec.classList.remove("active"));

      const target = document.getElementById(id);
      if (!target) {
        console.error("Section not found:", id);
        return;
      }
      target.classList.add("active");

      document.querySelectorAll(".sidebar a")
        .forEach(a => a.classList.remove("active"));

      if (el) el.classList.add("active");
    }

    function logout() {
      localStorage.clear();
      window.location.href = "/login.html";
    }
  </script>

</body>
</html>
