<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Faculty Forgot Password</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    *{
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#1e3a8a,#2563eb);
    }

    .card{
      background:#ffffff;
      width:400px;
      padding:36px 32px;
      border-radius:14px;
      text-align:center;
      box-shadow:0 25px 50px rgba(0,0,0,0.25);
    }

    h2{
      margin-bottom:22px;
      color:#1e40af;
      font-weight:600;
    }

    input{
      width:100%;
      padding:13px;
      margin:10px 0;
      border-radius:8px;
      border:1px solid #d1d5db;
      font-size:14px;
    }

    input:focus{
      outline:none;
      border-color:#2563eb;
      box-shadow:0 0 0 1px #2563eb;
    }

    button{
      width:100%;
      padding:13px;
      background:#2563eb;
      color:white;
      border:none;
      border-radius:8px;
      font-size:15px;
      cursor:pointer;
      margin-top:12px;
      font-weight:500;
    }

    button:hover{
      background:#1e40af;
    }

    .link{
      display:block;
      margin-top:18px;
      color:#2563eb;
      text-decoration:none;
      font-size:14px;
      font-weight:500;
    }

    #error{
      color:#dc2626;
      margin-top:8px;
      font-size:13px;
    }

    #success{
      color:#16a34a;
      margin-top:8px;
      font-size:13px;
    }

    @media(max-width:420px){
      .card{
        width:90%;
        padding:28px 22px;
      }
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Reset Faculty Password</h2>

  <!-- Step 1 -->
  <input id="email" type="email" placeholder="Faculty Email">
<button onclick="sendResetLink()">Send Reset Link</button>
<div id="error"></div>
<div id="success"></div>


  <!-- Step 2 -->
  <div id="step2" style="display:none;">
    <input id="newPassword" type="password" placeholder="New Password">
    <input id="confirmPassword" type="password" placeholder="Confirm Password">
    <button onclick="resetPassword()">Reset Password</button>
  </div>

  <a href="index.html" class="link">Back to Login</a>
</div>


<script>
function sendResetLink(){
  const email = document.getElementById("email").value.trim();
  const error = document.getElementById("error");
  const success = document.getElementById("success");

  error.textContent = "";
  success.textContent = "";

  if(!email){
    error.textContent = "Please enter your email";
    return;
  }

  fetch("/faculty/forgot-password",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ email })
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.success){
      success.textContent = "Password reset link sent to your email";
    }else{
      error.textContent = data.message || "Email not found";
    }
  })
  .catch(()=>{
    error.textContent="Server error";
  });
}
</script>


</body>
</html>
