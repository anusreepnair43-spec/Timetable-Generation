<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Forgot Password</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
  body{height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#1e3a8a,#2563eb);}
  .card{background:#fff;width:400px;padding:36px 32px;border-radius:14px;text-align:center;box-shadow:0 25px 50px rgba(0,0,0,0.25);}
  h2{margin-bottom:24px;color:#1e40af;font-weight:600;}
  input{width:100%;padding:13px;margin:10px 0;border-radius:8px;border:1px solid #d1d5db;font-size:14px;}
  input:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 1px #2563eb;}
  button{width:100%;padding:13px;background:#2563eb;color:white;border:none;border-radius:8px;font-size:15px;font-weight:500;cursor:pointer;margin-top:12px;}
  button:hover{background:#1e40af;}
  #message{font-size:14px;margin-top:10px;padding:10px;border-radius:6px;}
  #message.success{color:#16a34a;background:#f0fdf4;border:1px solid #86efac;}
  #message.error{color:#dc2626;background:#fef2f2;border:1px solid #fca5a5;}
  .back-link{display:block;margin-top:15px;color:#2563eb;text-decoration:none;}
  .back-link:hover{text-decoration:underline;}
  .loading{display:none;color:#2563eb;margin-top:10px;}
  @media(max-width:420px){.card{width:90%;padding:28px 22px;}}
</style>
</head>
<body>

<div class="card">
  <h2>Forgot Password</h2>
  <p style="color:#666;font-size:14px;margin-bottom:20px;">Enter your registered email to receive your password</p>
  <input id="email" type="email" placeholder="Enter your registered email" required>
  <button onclick="sendPassword()" id="submitBtn">Send Password</button>
  <div class="loading" id="loading">Sending password...</div>
  <div id="message"></div>
  <a href="index.html" class="back-link">Back to Login</a>
</div>

<script>
async function sendPassword() {
  const email = document.getElementById("email").value.trim().toLowerCase();
  const messageEl = document.getElementById("message");
  const submitBtn = document.getElementById("submitBtn");
  const loadingEl = document.getElementById("loading");
  
  // Clear previous messages
  messageEl.textContent = "";
  messageEl.className = "";
  
  // Validation
  if(!email){
    messageEl.textContent = "Please enter your email address";
    messageEl.className = "error";
    return;
  }
  
  // Basic email validation
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if(!emailRegex.test(email)){
    messageEl.textContent = "Please enter a valid email address";
    messageEl.className = "error";
    return;
  }
  
  try {
    // Show loading state
    submitBtn.disabled = true;
    submitBtn.textContent = "Sending...";
    loadingEl.style.display = "block";
    
    const res = await fetch("/student/forgot-password", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({email})
    });

    const data = await res.json();
    
    // Reset button state
    submitBtn.disabled = false;
    submitBtn.textContent = "Send Password";
    loadingEl.style.display = "none";
    
    if(data.success){
      messageEl.textContent = data.message || "Password information has been sent to your email";
      messageEl.className = "success";
      // Clear the email field
      document.getElementById("email").value = "";
    } else {
      messageEl.textContent = data.message || "Email not found in our records";
      messageEl.className = "error";
    }

  } catch(err){
    console.error("Error sending password:", err);
    // Reset button state
    submitBtn.disabled = false;
    submitBtn.textContent = "Send Password";
    loadingEl.style.display = "none";
    
    messageEl.textContent = "Server error. Please try again later.";
    messageEl.className = "error";
  }
}

// Allow pressing Enter to submit
document.getElementById("email").addEventListener("keypress", function(event) {
  if (event.key === "Enter") {
    event.preventDefault();
    sendPassword();
  }
});
</script>

</body>
</html>
